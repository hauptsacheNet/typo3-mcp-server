<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Change preview</title>
<style>
  :root {
    color-scheme: light dark;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.45;
  }
  body { margin: 0; padding: 12px; color: #111; background: #fff; }
  @media (prefers-color-scheme: dark) {
    body { color: #e8e8e8; background: #1f1f1f; }
    .card { border-color: #3a3a3a; background: #262626; }
    .field-name { color: #b8b8b8; }
    ins { background: #1f3d24; color: #b9f3c0; }
    del { background: #4a1e1e; color: #f3b9b9; }
    button, a.btn { background: #2f6dcc; color: #fff; }
    button.secondary, a.btn.secondary { background: #444; color: #eee; }
  }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px 14px; }
  .header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .title { font-weight: 600; font-size: 15px; margin: 0; }
  .subtitle { font-size: 12px; color: #777; margin-top: 2px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge.create { background: #e7f6ec; color: #186a2c; }
  .badge.update { background: #e7eef7; color: #1b4e95; }
  .badge.delete { background: #f7e7e7; color: #952121; }
  .badge.translate { background: #f3e7f7; color: #6a1e8f; }
  .badge.superseded { background: #ffeacc; color: #8a4b00; }
  .field { padding: 8px 0; border-top: 1px dashed #eee; }
  .field:first-child { border-top: 0; padding-top: 0; }
  .field-name { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .diff { white-space: pre-wrap; word-break: break-word; }
  .diff ins { background: #d5f5dd; color: #0e5a23; text-decoration: none; padding: 0 2px; border-radius: 2px; }
  .diff del { background: #f8d3d3; color: #7c1a1a; text-decoration: line-through; padding: 0 2px; border-radius: 2px; }
  .kv { display: grid; grid-template-columns: max-content 1fr; column-gap: 10px; row-gap: 2px; font-size: 13px; }
  .kv .k { color: #777; }
  .kv .v { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-word; }
  .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  button, a.btn { appearance: none; border: 0; background: #2f6dcc; color: #fff; padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; display: inline-block; }
  button.secondary, a.btn.secondary { background: #ddd; color: #333; }
  button[disabled], a.btn[aria-disabled="true"] { opacity: 0.55; cursor: not-allowed; pointer-events: none; }
  .status { font-size: 12px; color: #777; margin-top: 6px; min-height: 1.2em; }
  .status.error { color: #952121; }
  .superseded-card { opacity: 0.7; }
  .empty { font-size: 13px; color: #777; padding: 4px 0; }
  details.bridge-debug { font-size: 11px; color: #888; margin-top: 8px; }
  details.bridge-debug pre { white-space: pre-wrap; word-break: break-word; max-height: 160px; overflow: auto; }
</style>
</head>
<body>
<div class="card" id="card" role="region" aria-label="Change preview">
  <div class="header">
    <div>
      <div class="title" id="title">Loading change…</div>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div>
      <span class="badge" id="badge"></span>
      <span class="badge superseded" id="superseded-badge" hidden>Superseded</span>
    </div>
  </div>
  <div id="body" class="empty">Loading…</div>
  <div class="actions" id="actions" hidden>
    <button class="secondary" id="preview-btn" type="button" hidden>Preview</button>
    <button id="publish-btn" type="button">Publish this change</button>
  </div>
  <div class="status" id="status"></div>
  <details class="bridge-debug" id="bridge-debug" hidden>
    <summary>Bridge details</summary>
    <pre id="bridge-debug-content"></pre>
  </details>
</div>
<script>
(function () {
  "use strict";

  // ---------- MCP host bridge ----------
  //
  // We support both bridge flavours in use today:
  //
  //   (A) OpenAI Apps SDK (Claude Desktop, ChatGPT, anything tracking the
  //       reference SDK). Surface: window.openai.{toolOutput, callTool,
  //       openExternal, ...}. https://developers.openai.com/apps-sdk/reference
  //
  //   (B) SEP-1865 raw postMessage JSON-RPC (MCP Inspector and other
  //       spec-literal hosts). The view sends ui/initialize then
  //       ui/call-tool messages; the host returns JSON-RPC responses.
  //       https://github.com/modelcontextprotocol/ext-apps
  //
  // The widget tries (A) first since it's strictly richer, and falls back to
  // (B) when window.openai is absent. Failures are surfaced in a collapsible
  // diagnostic panel rather than swallowed silently.

  var DEBUG_LOG = [];
  function log(label, data) {
    try {
      DEBUG_LOG.push(label + ": " + (typeof data === "string" ? data : JSON.stringify(data)));
    } catch (_) {
      DEBUG_LOG.push(label + ": [unserialisable]");
    }
  }

  function hasOpenAi() {
    return typeof window.openai === "object" && window.openai !== null;
  }

  // ----- SEP-1865 fallback: minimal JSON-RPC over postMessage -----
  var pendingRpc = {};
  var rpcSeq = 1;

  function rpcCall(method, params) {
    return new Promise(function (resolve, reject) {
      var id = "rpc-" + (rpcSeq++);
      pendingRpc[id] = { resolve: resolve, reject: reject };
      var msg = { jsonrpc: "2.0", id: id, method: method, params: params || {} };
      log("postMessage send", msg);
      try {
        window.parent.postMessage(msg, "*");
      } catch (e) {
        delete pendingRpc[id];
        reject(e);
      }
      // 8s timeout — hosts vary, this is generous.
      setTimeout(function () {
        if (pendingRpc[id]) {
          delete pendingRpc[id];
          reject(new Error("Host did not respond to " + method + " within 8s"));
        }
      }, 8000);
    });
  }

  window.addEventListener("message", function (ev) {
    var data = ev && ev.data;
    if (!data || typeof data !== "object") return;
    if (data.jsonrpc !== "2.0") return;
    if (data.id != null && pendingRpc[data.id]) {
      var entry = pendingRpc[data.id];
      delete pendingRpc[data.id];
      log("postMessage recv", data);
      if (data.error) {
        entry.reject(new Error(data.error.message || "RPC error"));
      } else {
        entry.resolve(data.result);
      }
    }
  });

  // ----- Unified API surface -----
  function getToolOutput() {
    if (hasOpenAi()) {
      // OpenAI Apps SDK: structuredContent of the originating tool call.
      var o = window.openai.toolOutput;
      log("openai.toolOutput", o == null ? null : "present");
      return o == null ? null : o;
    }
    // Spec fallback: ui/initialize hands us host context including toolInfo.
    // We block on it during boot — see boot().
    return null;
  }

  function callTool(name, args) {
    if (hasOpenAi() && typeof window.openai.callTool === "function") {
      log("openai.callTool", name);
      return Promise.resolve(window.openai.callTool(name, args || {}));
    }
    log("rpc.callTool", name);
    return rpcCall("ui/call-tool", { name: name, arguments: args || {} });
  }

  function openExternal(href) {
    if (!href) return;
    if (hasOpenAi() && typeof window.openai.openExternal === "function") {
      log("openai.openExternal", href);
      window.openai.openExternal({ href: href });
      return;
    }
    // Spec fallback. Many hosts implement this; if not, we last-resort to
    // window.open (which may be blocked by sandbox flags — handled by the UI
    // by surfacing the URL).
    rpcCall("ui/open-external", { href: href }).catch(function () {
      try { window.open(href, "_blank", "noopener"); } catch (_) {}
    });
  }

  function parseToolResultText(result) {
    // Some hosts give us a CallToolResult shape (content[].text) — fall back
    // to digging the JSON out of it when structuredContent isn't available.
    if (!result) return null;
    var content = result.content || result;
    if (Array.isArray(content)) {
      for (var i = 0; i < content.length; i++) {
        var item = content[i];
        if (item && typeof item.text === "string") {
          try { return JSON.parse(item.text); } catch (_) {}
        }
      }
    }
    return null;
  }

  function extractToolPayload(result) {
    // OpenAI Apps SDK returns structuredContent directly from callTool; the
    // SEP-1865 fallback returns a full CallToolResult envelope. Handle both.
    if (!result) return null;
    if (result.structuredContent && typeof result.structuredContent === "object") {
      return result.structuredContent;
    }
    return parseToolResultText(result);
  }

  // ---------- DOM helpers ----------
  function $(id) { return document.getElementById(id); }
  function setText(id, t) { var el = $(id); if (el) el.textContent = t == null ? "" : String(t); }
  function setHtml(id, h) { var el = $(id); if (el) el.innerHTML = h; }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function stringify(v) {
    if (v === null || v === undefined) return "(empty)";
    if (typeof v === "string") return v;
    try { return JSON.stringify(v); } catch (_) { return String(v); }
  }

  // ---------- State ----------
  var diff = null;
  var supersededByLocal = false;
  var channel = null;

  function markSuperseded() {
    if (supersededByLocal) return;
    supersededByLocal = true;
    var sb = $("superseded-badge"); if (sb) sb.hidden = false;
    $("card").classList.add("superseded-card");
    var pub = $("publish-btn");
    if (pub) { pub.disabled = true; pub.title = "Newer change exists for this record."; }
    var prev = $("preview-btn");
    if (prev) prev.setAttribute("aria-disabled", "true");
    setText("status", "A newer write for this record exists below.");
  }

  function setupBroadcast(table, uid, ownWriteId) {
    if (typeof BroadcastChannel !== "function" || !table || uid == null) return;
    try {
      channel = new BroadcastChannel("mcp-write-table");
      channel.onmessage = function (ev) {
        var msg = ev && ev.data;
        if (!msg || msg.table !== table || msg.uid !== uid) return;
        if (typeof msg.writeId === "number" && msg.writeId > ownWriteId) {
          markSuperseded();
        }
      };
      channel.postMessage({ table: table, uid: uid, writeId: ownWriteId });
    } catch (e) {
      log("BroadcastChannel error", e && e.message);
      channel = null;
    }
  }

  function renderBadge(action) {
    var b = $("badge");
    if (!b) return;
    b.textContent = action || "change";
    b.className = "badge " + (action || "");
  }

  function renderHeader() {
    setText("title",
      (diff.action || "change").charAt(0).toUpperCase()
      + (diff.action || "change").slice(1)
      + " in " + (diff.table || "?") + " #" + (diff.uid != null ? diff.uid : "?")
    );
    var sub = [];
    if (diff.recordLabel) sub.push(diff.recordLabel);
    if (diff.writeId) sub.push("change #" + diff.writeId);
    setText("subtitle", sub.join(" · "));
  }

  function renderFields() {
    var fields = Array.isArray(diff.fields) ? diff.fields : [];
    if (!fields.length) {
      var hint = diff.isDeleted ? "Record marked for deletion." :
                 (diff.hasWorkspaceChange ? "No tracked field changes." :
                                            "No pending workspace change.");
      setHtml("body", '<div class="empty">' + escapeHtml(hint) + '</div>');
      return;
    }
    var html = "";
    for (var i = 0; i < fields.length; i++) {
      var f = fields[i];
      html += '<div class="field">';
      html += '<div class="field-name">' + escapeHtml(f.label || f.name) + '</div>';
      if (f.isText && typeof f.diffHtml === "string" && f.diffHtml.length) {
        html += '<div class="diff">' + f.diffHtml + '</div>';
      } else {
        html += '<div class="kv">';
        html += '<span class="k">before</span><span class="v">' + escapeHtml(stringify(f.before)) + '</span>';
        html += '<span class="k">after</span><span class="v">' + escapeHtml(stringify(f.after)) + '</span>';
        html += '</div>';
      }
      html += '</div>';
    }
    setHtml("body", html);
  }

  function wireActions() {
    var actions = $("actions");
    if (!actions) return;
    actions.hidden = false;

    var preview = $("preview-btn");
    var url = (diff && typeof diff.previewUrl === "string") ? diff.previewUrl : "";
    if (url) {
      preview.hidden = false;
      preview.title = url;
      preview.addEventListener("click", function () { openExternal(url); });
    } else {
      preview.hidden = true;
    }

    var publish = $("publish-btn");
    if (diff.action === "delete") {
      publish.textContent = "Publish deletion";
    }
    if (!diff.hasWorkspaceChange) {
      publish.disabled = true;
      publish.title = "Nothing pending to publish.";
    }
    publish.addEventListener("click", function () {
      if (publish.disabled) return;
      publish.disabled = true;
      setText("status", "Publishing…");
      var s = $("status"); if (s) s.classList.remove("error");
      callTool("PublishRecord", { table: diff.table, uid: diff.uid }).then(function (res) {
        var data = extractToolPayload(res) || {};
        if (data.published) {
          publish.textContent = "Published";
          setText("status", "Change is now live.");
        } else {
          publish.disabled = false;
          var s2 = $("status"); if (s2) s2.classList.add("error");
          setText("status", data.error || "Publish failed.");
        }
      }).catch(function (err) {
        publish.disabled = false;
        var s3 = $("status"); if (s3) s3.classList.add("error");
        setText("status", (err && err.message) || "Publish failed.");
      });
    });
  }

  function exposeBridgeDebug() {
    if (!DEBUG_LOG.length) return;
    var el = $("bridge-debug");
    var pre = $("bridge-debug-content");
    if (el && pre) {
      pre.textContent = DEBUG_LOG.join("\n");
      el.hidden = false;
    }
  }

  function showError(message) {
    setText("title", "Change preview");
    setHtml("body", '<div class="empty">' + escapeHtml(message) + '</div>');
    exposeBridgeDebug();
  }

  // ---------- Boot ----------
  function applyDiff(payload) {
    diff = payload;
    renderBadge(diff.action);
    renderHeader();
    renderFields();
    wireActions();
    if (typeof diff.currentWriteId === "number" && diff.currentWriteId > (diff.writeId || 0)) {
      markSuperseded();
    }
    setupBroadcast(diff.table, diff.uid, diff.writeId || 0);
  }

  function bootFromOpenAi() {
    var payload = getToolOutput();
    if (payload && typeof payload === "object") {
      applyDiff(payload);
      return true;
    }
    return false;
  }

  function bootFromSpec() {
    // SEP-1865: initialise the view, then pull structuredContent off the
    // toolInfo handed back by the host.
    rpcCall("ui/initialize", { protocolVersion: "0.1" }).then(function (initResult) {
      log("ui/initialize result", initResult);
      var toolInfo = initResult && (initResult.hostContext && initResult.hostContext.toolInfo);
      var payload = toolInfo && (toolInfo.structuredContent || toolInfo.tool && toolInfo.tool.structuredContent);
      if (!payload && toolInfo && toolInfo.tool && toolInfo.tool.result) {
        payload = extractToolPayload(toolInfo.tool.result);
      }
      if (payload && typeof payload === "object") {
        applyDiff(payload);
      } else {
        showError("Host did not provide tool result data (no structuredContent in ui/initialize response).");
      }
    }).catch(function (err) {
      showError("Bridge initialise failed: " + ((err && err.message) || "unknown error"));
    });
  }

  function boot() {
    if (bootFromOpenAi()) return;
    if (hasOpenAi()) {
      // Bridge exists but exposed no tool output — likely the host hasn't
      // forwarded the originating call yet. Retry once on the next frame.
      setTimeout(function () {
        if (!bootFromOpenAi()) bootFromSpec();
      }, 50);
      return;
    }
    bootFromSpec();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
