<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MCP Server – icon concepts</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 2rem; background: #fafafa; color: #333; }
  h1 { font-weight: 600; margin-bottom: 0.25rem; }
  p.lead { color: #666; margin-top: 0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; margin-top: 2rem; }
  .card { background: #fff; border: 1px solid #e3e3e3; border-radius: 8px; padding: 1rem; }
  .card h3 { font-size: 0.95rem; margin: 0 0 0.25rem; }
  .card .file { font-family: monospace; font-size: 0.75rem; color: #888; margin-bottom: 0.5rem; }
  .blurb { color:#666; font-size:0.8rem; margin-bottom:0.75rem; }
  .row { display: flex; align-items: center; gap: 0.75rem; padding: 0.45rem 0; border-top: 1px solid #f0f0f0; }
  .row:first-of-type { border-top: 0; }
  .row .label { font-size: 0.7rem; color: #999; width: 4.5rem; text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0; }
  .light { color: #2a2a2a; }
  .accent { color: #ff8700; }
  .muted { color: #6b7280; }
  .dark-bg { background: #1a1a1a; padding: 0.4rem; border-radius: 4px; color: #f5f5f5; display: inline-flex; }
  svg { display: block; }
  .s16 svg { width: 16px; height: 16px; }
  .s24 svg { width: 24px; height: 24px; }
  .s32 svg { width: 32px; height: 32px; }
  .s48 svg { width: 48px; height: 48px; }
</style>
</head>
<body>
<h1>MCP Server – icon concepts</h1>
<p class="lead">Each icon uses <code>currentColor</code> so it picks up the theme color of where it lives (user menu = grey, extension manager = primary, etc.).</p>

<div class="grid" id="grid"></div>

<script>
const variants = [
  ['01-plug.svg',         'Plug',                 'Universal "connection" symbol – instantly readable.'],
  ['02-bridge.svg',       'Bridge / two nodes',   'Two endpoints with a bidirectional link – literal MCP metaphor.'],
  ['03-server-stack.svg', 'Server stack',         'Server-first reading – fits the word "Server" in the name.'],
  ['04-network.svg',      'Network triangle',     '3-node graph: client, server, model.'],
  ['05-cube-signal.svg',  'Cube + broadcast',     'Evolves the current cube placeholder with a signal.'],
  ['06-m-wordmark.svg',   'M wordmark + nodes',   'Stylised "M" with terminal nodes; doubles as letterform.'],
  ['07-brain-port.svg',   'Split brain / port',   'Hemispheres = LLM, central seam suggests a port between them.'],
];

async function load(file) {
  const res = await fetch(file);
  return await res.text();
}

(async () => {
  const grid = document.getElementById('grid');
  for (const [file, name, blurb] of variants) {
    const svg = await load(file);
    grid.insertAdjacentHTML('beforeend', `
      <div class="card">
        <h3>${name}</h3>
        <div class="file">${file}</div>
        <div class="blurb">${blurb}</div>
        <div class="row"><span class="label">menu 16</span>
          <span class="s16 muted">${svg}</span>
          <span style="font-size:0.85rem; color:#444">MCP Server</span>
        </div>
        <div class="row"><span class="label">module 24</span>
          <span class="s24 light">${svg}</span>
          <span class="s24 accent">${svg}</span>
        </div>
        <div class="row"><span class="label">ext.man 32</span>
          <span class="s32 light">${svg}</span>
        </div>
        <div class="row"><span class="label">large 48</span>
          <span class="s48 light">${svg}</span>
          <span class="dark-bg s48">${svg}</span>
        </div>
      </div>
    `);
  }
})();
</script>
</body>
</html>
