name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  functional-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4', '8.5']

    name: PHP ${{ matrix.php-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: sqlite3, pdo_sqlite, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run functional test suite
        run: composer test

  llm-trigger:
    runs-on: ubuntu-latest
    name: Check LLM trigger
    if: github.event_name == 'pull_request'
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Check if tool-related files changed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Auto-trigger when tool implementations or LLM tests change
          FILES=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename')
          if echo "$FILES" | grep -qE '^(Classes/MCP/Tool/|Classes/Service/|Tests/Llm/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  llm-tests:
    needs: [llm-trigger]
    if: always() && (github.event_name == 'push' || needs.llm-trigger.outputs.run == 'true')
    runs-on: ubuntu-latest
    name: LLM Tests

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
        with:
          php-version: '8.4'
          extensions: sqlite3, pdo_sqlite, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create web entry point
        run: touch index.php

      - name: Run LLM test suite
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: vendor/bin/paratest -c Tests/Llm/phpunit-llm.xml --testdox --no-progress -p 5 --log-junit .Build/llm-results.xml
        continue-on-error: true

      - name: Check majority pass rule
        run: php Build/check-llm-results.php --min-pass=3
